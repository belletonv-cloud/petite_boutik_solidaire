<!doctype html>
<html lang="fr" style="background-color:#FAFAFA">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <script>
      // set --vh for mobile vh units
      window.__defineViewportHeight = function(){
        var t = window.innerHeight;
        document.documentElement.style.setProperty('--vh', t + 'px');
      };

      // Accessibility-friendly approach to accidental zoom:
      // - We DO NOT disable pinch/double-tap zoom globally (to preserve accessibility).
      // - When the browser reports a non-1 scale after rotation, we show a small reset control
      //   letting the user restore the default zoom/view (this is explicit and optional).
      // configuration
      var ORIENTATION_RESET_SCREEN_MAX = 420; // px: only auto-reset on small screens
      var ORIENTATION_RESET_DELAY = 300; // ms before handling orientation change
      var RESET_META_DURATION = 300; // ms to keep maximum-scale=1.0 before restoring

      function maybeShowResetZoomControl() {
        try {
          if (!window.visualViewport) return;
          // control/button removed — no visual control shown. Keep function for compatibility.
        } catch (e) { /* ignore */ }
      }

      function announceAccessibly(message) {
        try {
          var live = document.getElementById('reset-zoom-live');
          if (!live) return;
          live.textContent = message;
        } catch(e) { /* ignore */ }
      }

      function resetZoomTemporarily() {
        try {
          var meta = document.querySelector('meta[name="viewport"]');
          if (!meta) return;
          var base = 'width=device-width, initial-scale=1.0, viewport-fit=cover';
          // announce before resetting so screen readers are aware
          announceAccessibly('Réinitialisation de l\'affichage en cours');
          console.debug('[zoom-reset] start: applying temporary meta to force zoom-out');
          // temporarily set maximum-scale=1 and disable user scaling to force a full "zoom out" state
          // (this is intentional and temporary; we restore the original meta shortly after)
          meta.setAttribute('content', base + ', maximum-scale=1.0, user-scalable=0');
          // nudge focus/scroll to encourage reflow on some browsers
          try { if (document.activeElement && document.activeElement.blur) document.activeElement.blur(); } catch(e) {}
          try { var sx = window.scrollX || 0, sy = window.scrollY || 0; window.scrollTo(sx, sy + 1); setTimeout(function(){ window.scrollTo(sx, sy); }, 50); } catch(e) {}

          // Poll visualViewport.scale until it reports 1 (or until timeout) then restore the meta tag.
          var start = Date.now();
          var timedOut = false;
          var pollInterval = 50;
          var maxWait = RESET_META_DURATION + 400; // allow a bit more time for devices
          var poller = setInterval(function(){
            try {
              var s = window.visualViewport ? Math.round(window.visualViewport.scale * 100) / 100 : 1;
              console.debug('[zoom-reset] poll scale=', s, 'elapsed=', Date.now()-start);
              if (s === 1 || (Date.now() - start) > maxWait) {
                clearInterval(poller);
                // restore original viewport meta
                try { meta.setAttribute('content', base); } catch(e) {}
                // small additional reflow nudge
                try { var sx2 = window.scrollX || 0, sy2 = window.scrollY || 0; window.scrollTo(sx2, sy2 + 1); setTimeout(function(){ window.scrollTo(sx2, sy2); }, 50); } catch(e) {}
                announceAccessibly('Affichage réinitialisé');
                console.debug('[zoom-reset] finished: scale=', s, 'total_ms=', Date.now()-start);
                maybeShowResetZoomControl();
              }
            } catch (e) {
              clearInterval(poller);
              try { meta.setAttribute('content', base); } catch(e) {}
              console.debug('[zoom-reset] error during poll, restored meta');
              maybeShowResetZoomControl();
            }
          }, pollInterval);
        } catch (e) { /* ignore */ }
      }

      // Expose a manual trigger for debugging/testing
      try { window.__forceResetZoom = resetZoomTemporarily } catch (e) {}

      window.addEventListener('resize', function(){ window.__defineViewportHeight(); maybeShowResetZoomControl(); });
      window.addEventListener('orientationchange', function(){
        // Only auto-reset for small screens to avoid surprising tablet/desktop users
        setTimeout(function(){
          window.__defineViewportHeight();
          try {
            var w = Math.max(window.screen.width || 0, window.innerWidth || 0);
            if (w <= ORIENTATION_RESET_SCREEN_MAX && window.visualViewport && Math.round(window.visualViewport.scale * 100) / 100 !== 1) {
              // auto-reset on small screens when scale != 1
              resetZoomTemporarily();
            } else {
              maybeShowResetZoomControl();
            }
          } catch (e) { maybeShowResetZoomControl(); }
        }, ORIENTATION_RESET_DELAY);
      });
      // initial run
      window.__defineViewportHeight();
      // register visualViewport listeners to allow possible future behaviour
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', maybeShowResetZoomControl);
        window.visualViewport.addEventListener('scroll', maybeShowResetZoomControl);
        // initial check after load
        setTimeout(maybeShowResetZoomControl, 200);
      }

      // On page show / load (including refresh), ensure small screens are shown at correct zoom
      function checkAndResetOnLoad() {
        try {
          var w = Math.max(window.screen.width || 0, window.innerWidth || 0);
          if (w <= ORIENTATION_RESET_SCREEN_MAX && window.visualViewport && Math.round(window.visualViewport.scale * 100) / 100 !== 1) {
            // perform the gentle reset on load so the page renders correctly after refresh
            resetZoomTemporarily();
          } else {
            maybeShowResetZoomControl();
          }
        } catch (e) { try { maybeShowResetZoomControl(); } catch (e){} }
      }

      document.addEventListener('DOMContentLoaded', function(){ setTimeout(checkAndResetOnLoad, 200); });
      window.addEventListener('pageshow', function(){ setTimeout(checkAndResetOnLoad, 200); });
    </script>
