    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <script>
      // set --vh for mobile vh units
      window.__defineViewportHeight = function(){
        var t = window.innerHeight;
        document.documentElement.style.setProperty('--vh', t + 'px');
      };

      // If the device supports touch, enforce a maximum-scale to avoid accidental pinch/double-tap zoom.
      // This makes the UI more stable on mobile orientation changes. We only apply it on touch devices.
      function enforceMobileViewportZoom() {
        try {
          var isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0 || navigator.msMaxTouchPoints > 0;
          var meta = document.querySelector('meta[name="viewport"]');
          if (!meta) return;
          var base = 'width=device-width, initial-scale=1.0, viewport-fit=cover';
          if (isTouch) {
            // Prevent pinch/double-tap zoom which often breaks layout on orientation change
            meta.setAttribute('content', base + ', maximum-scale=1.0, user-scalable=0');
          } else {
            meta.setAttribute('content', base);
          }
        } catch (e) { /* ignore */ }
      }

      window.addEventListener('resize', function(){ window.__defineViewportHeight(); enforceMobileViewportZoom(); });
      window.addEventListener('orientationchange', function(){
        setTimeout(function(){ window.__defineViewportHeight(); enforceMobileViewportZoom(); }, 120);
      });
      // initial run
      window.__defineViewportHeight();
      enforceMobileViewportZoom();
    </script>
